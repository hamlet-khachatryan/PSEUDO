<svg width="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <!-- circular clip that matches the navy disc — tight enough that wide amber bleeds out -->
  <clipPath id="disc">
    <circle cx="340" cy="340" r="268"/>
  </clipPath>
</defs>

<!-- navy circular background — just the disc, transparent outside -->
<circle cx="340" cy="340" r="268" fill="#0e1a2e" style="fill:rgb(14, 26, 46);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Everything inside the clip stays on the navy disc;              -->
<!-- the clipped group is drawn first so distributions on top bleed  -->
<g clip-path="url(#disc)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
  <!-- subtle unit circle ring -->
  <circle cx="340" cy="340" r="224" fill="none" stroke="#1a2a42" stroke-width="1.2" style="fill:none;stroke:rgb(26, 42, 66);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- cross hairs -->
  <line x1="340" y1="100" x2="340" y2="580" stroke="#152030" stroke-width="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(21, 32, 48);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="100" y1="340" x2="580" y2="340" stroke="#152030" stroke-width="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(21, 32, 48);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- dashed diagonal connecting the two banana peaks -->
  <line x1="202" y1="118" x2="468" y2="558" stroke="#1e2d40" stroke-width="1" stroke-dasharray="6,5" style="fill:rgb(0, 0, 0);stroke:rgb(30, 45, 64);color:rgb(255, 255, 255);stroke-width:1px;stroke-dasharray:6px, 5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- origin marker -->
  <circle cx="340" cy="340" r="10" fill="none" stroke="#1e2d40" stroke-width="1" style="fill:none;stroke:rgb(30, 45, 64);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="340" cy="340" r="3.5" fill="#2d4060" style="fill:rgb(45, 64, 96);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- FOM centroid dot (amber banana) -->
  <circle cx="262" cy="214" r="9" fill="none" stroke="#f0a500" stroke-width="1.2" opacity="0.5" style="fill:none;stroke:rgb(240, 165, 0);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="262" cy="214" r="3" fill="#f0a500" opacity="0.72" style="fill:rgb(240, 165, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.72;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</g>

<!-- ═══════════════════════════════════════════════════ -->
<!-- BIASED banana — amber, wide, centre ~120°           -->
<!-- drawn WITHOUT clip so outer washes bleed past disc  -->
<!-- ═══════════════════════════════════════════════════ -->
<!-- outermost wash — bleeds off the disc edges -->
<path d="M 510 158 A 246 246 0 0 0 100 396" fill="none" stroke="#f0a500" stroke-width="46" stroke-linecap="round" opacity="0.055" style="fill:none;stroke:rgb(240, 165, 0);color:rgb(255, 255, 255);stroke-width:46px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.055;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<path d="M 472 132 A 240 240 0 0 0 100 340" fill="none" stroke="#f0a500" stroke-width="34" stroke-linecap="round" opacity="0.12" style="fill:none;stroke:rgb(240, 165, 0);color:rgb(255, 255, 255);stroke-width:34px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.12;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- mid layers — partially clipped by disc edge -->
<path d="M 404 114 A 232 232 0 0 0 116 276" fill="none" stroke="#f0a500" stroke-width="22" stroke-linecap="round" opacity="0.28" style="fill:none;stroke:rgb(240, 165, 0);color:rgb(255, 255, 255);stroke-width:22px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.28;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<path d="M 348 118 A 222 222 0 0 0 148 228" fill="none" stroke="#f0a500" stroke-width="13" stroke-linecap="round" opacity="0.56" style="fill:none;stroke:rgb(240, 165, 0);color:rgb(255, 255, 255);stroke-width:13px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.56;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- bright core — sits well inside disc -->
<path d="M 290 138 A 210 210 0 0 0 196 196" fill="none" stroke="#f0a500" stroke-width="5.5" stroke-linecap="round" opacity="0.92" style="fill:none;stroke:rgb(240, 165, 0);color:rgb(255, 255, 255);stroke-width:5.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.92;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>


<!-- ═══════════════════════════════════════════════════ -->
<!-- DEBIASED banana — blue, tight, centre ~−60°         -->
<!-- tight enough that only the outermost wash bleeds    -->
<!-- ═══════════════════════════════════════════════════ -->
<!-- outermost wash — nudges past the disc at lower-right -->
<path d="M 322 582 A 244 244 0 0 0 560 448" fill="none" stroke="#58a6ff" stroke-width="30" stroke-linecap="round" opacity="0.08" style="fill:none;stroke:rgb(88, 166, 255);color:rgb(255, 255, 255);stroke-width:30px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.08;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<path d="M 374 576 A 236 236 0 0 0 528 486" fill="none" stroke="#58a6ff" stroke-width="20" stroke-linecap="round" opacity="0.22" style="fill:none;stroke:rgb(88, 166, 255);color:rgb(255, 255, 255);stroke-width:20px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.22;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<path d="M 413 558 A 228 228 0 0 0 498 510" fill="none" stroke="#58a6ff" stroke-width="11" stroke-linecap="round" opacity="0.56" style="fill:none;stroke:rgb(88, 166, 255);color:rgb(255, 255, 255);stroke-width:11px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.56;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- bright core -->
<path d="M 430 538 A 216 216 0 0 0 470 512" fill="none" stroke="#58a6ff" stroke-width="5" stroke-linecap="round" opacity="0.96" style="fill:none;stroke:rgb(88, 166, 255);color:rgb(255, 255, 255);stroke-width:5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.96;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

</svg>